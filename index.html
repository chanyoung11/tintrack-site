<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tintrack — 지도 위에 남기는 우리의 순간</title>
<meta property="og:title" content="Tintrack">
<meta property="og:description" content="지도 위에 사진·영상 핀을 남기고 친구와 공유하세요.">
<meta name="theme-color" content="#17151f">
<link rel="stylesheet" href="style.css">
<style>
  .hero { text-align: center; padding: 40px 0 8px; }
  .logo {
    width: 76px; height: 76px; border-radius: 20px; margin: 0 auto 22px;
    background: linear-gradient(150deg, #a855f7, #7c3aed);
    box-shadow: 0 12px 40px rgba(168,85,247,.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
  }
  .hero h1 { font-size: 34px; margin: 0 0 12px; }
  .hero p { color: var(--muted); font-size: 17px; margin: 0 auto; max-width: 460px; }
  .stores { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 34px 0 8px; }
  .store-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); text-decoration: none; font-weight: 600; font-size: 15px;
    padding: 13px 22px; border-radius: 13px;
  }
  .store-btn[aria-disabled="true"] { opacity: .5; pointer-events: none; }
  .note { text-align: center; color: var(--muted); font-size: 13px; margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <span class="dot"></span>
    <a href="./">Tintrack</a>
  </header>

  <section class="hero">
    <div class="logo">📍</div>
    <h1>지도 위에 남기는<br>우리의 순간</h1>
    <p>가본 곳에 사진·영상 핀을 남기고, 친구와만 조용히 공유하는 지도.</p>

    <div class="stores">
      <a class="store-btn" id="ios" href="#" aria-disabled="true"> App Store</a>
      <a class="store-btn" id="android" href="#" aria-disabled="true">▶ Google Play</a>
    </div>
    <p class="note">곧 출시됩니다.</p>
  </section>

  <footer style="justify-content:center">
    <a href="privacy.html">개인정보처리방침</a>
    <a href="terms.html">이용약관</a>
    <span>© 2026 바디페인팅</span>
  </footer>
</div>
</body>
</html>
